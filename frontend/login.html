<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — CookMyShow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar" id="main-nav"></header>

<div style="min-height:calc(100vh - var(--nav-h));display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;overflow:hidden;">
  <!-- BG decoration -->
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(245,166,35,0.06) 0%,transparent 70%);pointer-events:none"></div>

  <div style="width:100%;max-width:440px;position:relative;z-index:1">
    <!-- Brand -->
    <div style="text-align:center;margin-bottom:36px">
      <a href="index.html" style="font-family:var(--font-display);font-size:2.2rem;letter-spacing:3px;color:var(--accent);text-decoration:none">COOK<span style="color:var(--accent-alt)">MY</span>SHOW</a>
      <p style="color:var(--text-muted);font-size:0.85rem;margin-top:8px">Your world of live experiences</p>
    </div>

    <div style="background:var(--bg-elevated);border:1px solid var(--border-light);border-radius:var(--radius-xl);padding:40px">
      <h1 style="font-family:var(--font-display);font-size:2rem;letter-spacing:1px;margin-bottom:6px">Welcome back</h1>
      <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:28px">Sign in to continue booking amazing events</p>

      <div id="error-msg" style="display:none;background:rgba(232,56,109,0.12);border:1px solid rgba(232,56,109,0.3);border-radius:var(--radius-sm);padding:12px 16px;color:var(--accent-alt);font-size:0.85rem;margin-bottom:20px"></div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px">
          <button id="toggle-pass" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.9rem">👁</button>
        </div>
      </div>

      <button class="btn btn-primary" id="login-btn" style="width:100%;margin-top:8px" onclick="handleLogin()">
        Sign In
      </button>

      <div class="form-divider">or</div>

      <div style="text-align:center;font-size:0.875rem;color:var(--text-secondary)">
        Don't have an account?
        <a href="register.html" style="color:var(--accent);font-weight:600;text-decoration:none;margin-left:4px">Create one</a>
      </div>
    </div>

    <!-- Demo hint -->
    <div style="margin-top:16px;padding:14px;background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.15);border-radius:var(--radius-md);font-size:0.78rem;color:var(--text-muted)">
      <strong style="color:var(--accent)">Demo:</strong> Register first, then log in. Use role 2 for customer, role 3 for organizer.
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    renderNav('');

    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      window.location.href = Auth.isOrganizer() ? 'organizer-dashboard.html' : 'index.html';
    }

    // Toggle password visibility
    document.getElementById('toggle-pass').addEventListener('click', () => {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });

    // Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  });

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errDiv = document.getElementById('error-msg');
    const btn = document.getElementById('login-btn');

    errDiv.style.display = 'none';

    if (!email || !password) {
      errDiv.textContent = 'Please fill in all fields.';
      errDiv.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    try {
      const data = await api.post('/auth/login', { email, password });
      Auth.setToken(data.token);
      Auth.setRole(data.role_id);

      showToast('Welcome back! 🎉', 'success');

      setTimeout(() => {
        if (data.role_id === 3) {
          window.location.href = 'organizer-dashboard.html';
        } else {
          const redirect = new URLSearchParams(window.location.search).get('redirect');
          window.location.href = redirect || 'index.html';
        }
      }, 800);
    } catch (e) {
      errDiv.textContent = e.message || 'Login failed. Please check your credentials.';
      errDiv.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
